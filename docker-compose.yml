services:
  backend:
    image: compass-backend
    build:
      context: ./backend
    container_name: compass-backend
    restart: unless-stopped
    environment:
      # Production: point this at your DigitalOcean managed Postgres in `.env`.
      # Local dev: use `docker-compose.local.yml` which provides a local `db` service.
      DATABASE_URL: ${DATABASE_URL}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-false}
      DEMO_MODE: ${DEMO_MODE:-false}
      SECRET_KEY: ${SECRET_KEY:-}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-false}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-60}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      ENABLE_API_DOCS: ${ENABLE_API_DOCS:-true}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
      # FCA DISP feature flags (set in .env; values below are defaults if unset)
      REQUIRE_FINAL_RESPONSE_EVIDENCE: ${REQUIRE_FINAL_RESPONSE_EVIDENCE:-true}
      REQUIRE_D1_CHECKLIST: ${REQUIRE_D1_CHECKLIST:-true}
      REQUIRE_OUTBOUND_BEFORE_CLOSE: ${REQUIRE_OUTBOUND_BEFORE_CLOSE:-true}
      ENABLE_DEADLINE_NOTIFICATIONS: ${ENABLE_DEADLINE_NOTIFICATIONS:-false}
      ENABLE_SUPPORT_NEEDS: ${ENABLE_SUPPORT_NEEDS:-false}
      ENABLE_DELAY_RESPONSE_KIND: ${ENABLE_DELAY_RESPONSE_KIND:-true}
      ENABLE_BROKER_REFERRAL: ${ENABLE_BROKER_REFERRAL:-true}
      ENABLE_ATTACHMENT_HASHING: ${ENABLE_ATTACHMENT_HASHING:-false}
      RESTRICT_VULNERABILITY_NOTES: ${RESTRICT_VULNERABILITY_NOTES:-false}
      NO_OUTBOUND_DAYS_WARNING: ${NO_OUTBOUND_DAYS_WARNING:-14}
    volumes:
      - attachments_data:/app/storage/attachments
    expose:
      - "8000"

  frontend:
    image: compass-frontend
    build:
      context: ./frontend
    container_name: compass-frontend
    restart: unless-stopped
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    container_name: compass-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro

volumes:
  attachments_data:
    name: compass_attachments_data
